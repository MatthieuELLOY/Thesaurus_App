<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thésaurus Médical</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;1,300&family=DM+Mono:wght@400;500&family=Libre+Franklin:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f5f0; --surface: #fff; --border: #e2ddd6; --text: #1c1b18;
  --muted: #6b6760; --light: #9e9b94; --accent: #2a4a3e;
  --ok: #27500A; --ok-bg: #eaf3de;
  --warn: #854F0B; --warn-bg: #fef3e2;
}
body { font-family: 'Libre Franklin', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar { width: 200px; background: #1c1b18; flex-shrink: 0; display: flex; flex-direction: column; }
.logo { padding: 24px 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.logo h1 { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 300; color: #fff; line-height: 1.4; }
.logo h1 em { font-style: italic; color: rgba(255,255,255,0.4); }
.nav { padding: 12px 0; flex: 1; }
.nav-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.55); transition: all 0.12s; border-left: 2px solid transparent; user-select: none; }
.nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
.nav-item.active { color: #fff; background: rgba(255,255,255,0.08); border-left-color: #5DCAA5; }
.nav-item .n { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.3); }
.nav-item.active .n { color: rgba(255,255,255,0.6); }
.btn-quit { display: flex; align-items: center; gap: 8px; padding: 10px 16px; cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.35); background: none; border: none; width: 100%; text-align: left; font-family: 'Libre Franklin', sans-serif; transition: all 0.12s; border-bottom: 1px solid rgba(255,255,255,0.06); }
.btn-quit:hover { color: #f87171; background: rgba(255,255,255,0.04); }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); height: 52px; display: flex; align-items: center; padding: 0 24px; gap: 16px; }
.topbar h2 { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 300; flex: 1; }
.search { border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-family: 'Libre Franklin', sans-serif; font-size: 13px; width: 220px; outline: none; background: var(--bg); }
.search:focus { border-color: var(--accent); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 6px; font-family: 'Libre Franklin', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.12s; }
.btn-green { background: var(--accent); color: #fff; }
.btn-green:hover { background: #1e3830; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--bg); }
.btn-red { background: #fdf0ee; color: #c0392b; border: 1px solid #f5c6c2; }
.btn-red:hover { background: #fbe3e1; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Table */
.table-wrap { flex: 1; overflow: auto; padding: 20px 24px; }
table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
thead th { background: var(--bg); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 1px solid var(--border); }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #faf9f6; }
td { padding: 10px 14px; font-size: 13.5px; vertical-align: middle; }
.id-pill { font-family: 'DM Mono', monospace; font-size: 11px; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
.valide-on  { background: var(--ok-bg); color: var(--ok); font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.valide-off { background: var(--warn-bg); color: var(--warn); font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.actions { display: flex; gap: 6px; }

/* Modal */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 10px; width: 460px; max-width: 95vw; box-shadow: 0 16px 48px rgba(0,0,0,0.18); }
.modal-head { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-head h3 { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 300; }
.close { width: 26px; height: 26px; border-radius: 50%; background: var(--bg); border: none; cursor: pointer; font-size: 15px; color: var(--muted); }
.close:hover { background: var(--border); }
.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); display: block; margin-bottom: 5px; }
input, textarea, select { width: 100%; padding: 8px 11px; border: 1.5px solid var(--border); border-radius: 6px; font-family: 'Libre Franklin', sans-serif; font-size: 13.5px; color: var(--text); outline: none; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 70px; line-height: 1.5; }

/* Toast */
.toast { position: fixed; bottom: 20px; right: 20px; background: #1c1b18; color: #fff; padding: 9px 16px; border-radius: 7px; font-size: 13px; font-family: 'DM Mono', monospace; opacity: 0; transform: translateY(6px); transition: all 0.2s; z-index: 500; pointer-events: none; }
.toast.show { opacity: 1; transform: none; }

.empty { text-align: center; padding: 40px; color: var(--light); font-size: 13px; }
.loading { text-align: center; padding: 40px; color: var(--light); font-family: 'DM Mono', monospace; font-size: 12px; }
.btn-amber { background: #fef3e2; color: #854F0B; border: 1px solid #f5d9a8; }
.btn-amber:hover { background: #fde8c0; }
.filter-toggle { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--muted); transition: all 0.12s; user-select: none; }
.filter-toggle.active { background: #fef3e2; color: #854F0B; border-color: #f5d9a8; }
.filter-toggle input { display: none; }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 0 24px 0; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
.progress-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--light); padding: 4px 24px 12px; }
</style>
</head>
<body>

<nav class="sidebar">
  <button class="btn-quit" onclick="quitApp()">⏻ Quitter</button>
  <div class="logo"><h1>Thésaurus<br><em>Éditeur</em></h1></div>
  <div class="nav" id="nav"></div>
</nav>

<div class="main">
  <div class="topbar">
    <h2 id="page-title">—</h2>
    <input class="search" type="text" placeholder="Rechercher…" id="search" oninput="applyFilters()">
    <label class="filter-toggle" id="filter-toggle" title="Afficher uniquement les non validés">
      <input type="checkbox" id="filter-nonvalide" onchange="applyFilters()">
      ⚠ Non validés
    </label>
    <button class="btn btn-amber" onclick="exportData()">↓ Exporter</button>
    <button class="btn btn-green" onclick="openAdd()">+ Nouveau</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-label" id="progress-label"></div>
  <div class="table-wrap">
    <div id="table-area"><div class="loading">Chargement…</div></div>
  </div>
</div>

<!-- Modal nouveau -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">Nouveau terme</h3>
      <button class="close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="modal-warn" style="display:none;background:#fef3e2;color:#854F0B;border:1px solid #f5d9a8;border-radius:6px;padding:9px 12px;font-size:13px;margin-bottom:4px"></div>
      <div><label>Terme</label><input id="f-terme" type="text" oninput="document.getElementById('modal-warn').style.display='none'"></div>
      <div><label>Synonymes <span style="font-weight:400;text-transform:none">(séparés par |)</span></label><input id="f-synonymes" type="text"></div>
      <div><label>Définition</label><textarea id="f-definition"></textarea></div>
      <div id="subcat-group" style="display:none"><label>Sous-catégorie</label>
        <select id="f-sous_categorie">
          <option value="traitement_pathologie">traitement_pathologie</option>
          <option value="traitement_symptome">traitement_symptome</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-green" onclick="submitModal()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS = ['anatomie','pathologie','symptome','examen','traitement','dispositif','medicament'];
const CAT_COLORS = {
  anatomie:'#1D6B56', pathologie:'#7B2D1E', symptome:'#7B2356',
  examen:'#0C447C', traitement:'#27500A', dispositif:'#854F0B', medicament:'#6B21A8'
};
const CAT_BG = {
  anatomie:'#e8f5f0', pathologie:'#fdf0ec', symptome:'#fdf0f6',
  examen:'#ebf3fb', traitement:'#eaf3de', dispositif:'#fef3e2', medicament:'#f3e8ff'
};

let currentCat = 'anatomie';
let allTerms = [];
let editingId = null;

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  const stats = await get('/api/stats');
  const nav = document.getElementById('nav');
  nav.innerHTML = CATS.map(cat => `
    <div class="nav-item ${cat===currentCat?'active':''}" id="nav-${cat}" onclick="switchCat('${cat}')">
      ${cat.charAt(0).toUpperCase()+cat.slice(1)}
      <span class="n" id="stat-${cat}">${stats[cat]||0}</span>
    </div>`).join('');
  loadCat('anatomie');
}

async function switchCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${cat}`).classList.add('active');
  loadCat(cat);
}

// ── Load & render ─────────────────────────────────────────────────────────
async function loadCat(cat) {
  document.getElementById('page-title').textContent =
    cat.charAt(0).toUpperCase() + cat.slice(1);
  document.getElementById('table-area').innerHTML = '<div class="loading">Chargement…</div>';
  allTerms = await get(`/api/terms/${cat}`);
  document.getElementById('filter-nonvalide').checked = false;
  document.getElementById('filter-toggle').classList.remove('active');
  document.getElementById('search').value = '';
  renderTable(allTerms);
  updateProgress();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const onlyNonValide = document.getElementById('filter-nonvalide').checked;
  document.getElementById('filter-toggle').classList.toggle('active', onlyNonValide);

  let filtered = allTerms;
  if (q) filtered = filtered.filter(t =>
    t.terme?.toLowerCase().includes(q) || t.synonymes?.toLowerCase().includes(q));
  if (onlyNonValide) filtered = filtered.filter(t =>
    t.valide !== '1' && t.valide !== 'true' && t.valide !== 1);

  renderTable(filtered);
  updateProgress();
}

function updateProgress() {
  const total    = allTerms.length;
  const validated = allTerms.filter(t => t.valide === '1' || t.valide === 'true' || t.valide === 1).length;
  const pct = total ? Math.round(validated / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    `${validated} / ${total} validés (${pct}%)`;
}

async function exportData() {
  const btn = document.querySelector('.btn-amber');
  btn.textContent = '… Export en cours';
  btn.disabled = true;
  try {
    const res = await fetch('/api/export');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'thesaurus_export.zip';
    a.click();
    URL.revokeObjectURL(url);
    toast('Export téléchargé ✓');
  } finally {
    btn.textContent = '↓ Exporter';
    btn.disabled = false;
  }
}

function renderTable(terms) {
  const color = CAT_COLORS[currentCat];
  const bg    = CAT_BG[currentCat];
  const isTrait = currentCat === 'traitement';

  if (!terms.length) {
    document.getElementById('table-area').innerHTML = '<div class="empty">Aucun terme trouvé</div>';
    return;
  }

  const rows = terms.map(t => {
    const valide = t.valide === '1' || t.valide === 'true' || t.valide === 1;
    const scBadge = isTrait && t.sous_categorie
      ? `<span style="font-size:11px;background:${t.sous_categorie.includes('symptome')?'#fdf0e8':'#eaf3de'};color:${t.sous_categorie.includes('symptome')?'#7B2D1E':'#27500A'};padding:2px 7px;border-radius:10px">${t.sous_categorie}</span>`
      : '';
    return `<tr>
      <td><span class="id-pill" style="background:${bg};color:${color}">${t.id}</span></td>
      <td><strong>${t.terme||''}</strong>${isTrait ? ' '+scBadge : ''}</td>
      <td><span class="${valide?'valide-on':'valide-off'}">${valide?'✓ Validé':'En attente'}</span></td>
      <td>
        <div class="actions">
          <a href="/edit/${currentCat}/${encodeURIComponent(t.id)}" class="btn btn-outline btn-sm">Modifier</a>
          <button class="btn btn-red btn-sm" onclick="deleteTerm('${t.id}')">Supprimer</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('table-area').innerHTML = `
    <table>
      <thead><tr>
        <th>ID</th><th>Terme${isTrait?' / Sous-catégorie':''}</th>
        <th>Statut</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Delete ────────────────────────────────────────────────────────────────
async function deleteTerm(id) {
  const rels = await get(`/api/relations/${currentCat}/${encodeURIComponent(id)}`);
  const nbRels = Object.values(rels).reduce((s, v) => s + (v.items?.length || 0), 0);
  const msg = nbRels
    ? `Supprimer ${id} ?\n\n⚠ ${nbRels} relation(s) associée(s) seront aussi supprimées.`
    : `Supprimer ${id} ?`;
  if (!confirm(msg)) return;
  const res = await del(`/api/terms/${currentCat}/${encodeURIComponent(id)}`);
  toast(res.message || 'Supprimé');
  loadCat(currentCat);
  refreshStat(currentCat);
}

// ── Add modal ─────────────────────────────────────────────────────────────
function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Nouveau terme';
  document.getElementById('f-terme').value = '';
  document.getElementById('f-synonymes').value = '';
  document.getElementById('f-definition').value = '';
  document.getElementById('subcat-group').style.display = currentCat === 'traitement' ? '' : 'none';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('f-terme').focus(), 50);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function submitModal() {
  const data = {
    terme:      document.getElementById('f-terme').value.trim(),
    synonymes:  document.getElementById('f-synonymes').value.trim(),
    definition: document.getElementById('f-definition').value.trim(),
  };
  if (currentCat === 'traitement') data.sous_categorie = document.getElementById('f-sous_categorie').value;
  if (!data.terme) { toast('Le terme est requis'); return; }

  const r = await fetch(`/api/terms/${currentCat}`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });

  if (r.status === 409) {
    const err = await r.json();
    const detail = err.detail || err;
    const existing = detail.existing || {};
    const warn = document.getElementById('modal-warn');
    warn.innerHTML = `⚠ Ce terme existe déjà : <a href="/edit/${currentCat}/${encodeURIComponent(existing.id)}" style="color:#854F0B;font-weight:600">${existing.terme} (${existing.id})</a>`;
    warn.style.display = '';
    return;
  }

  const res = await r.json();
  toast(`Ajouté : ${res.id}`);
  closeModal();
  loadCat(currentCat);
  refreshStat(currentCat);
}

// ── Utils ─────────────────────────────────────────────────────────────────
async function refreshStat(cat) {
  const terms = await get(`/api/terms/${cat}`);
  document.getElementById(`stat-${cat}`).textContent = terms.length;
}

async function get(url)           { const r = await fetch(url); return r.json(); }
async function post(url, body)    { const r = await fetch(url, {method:'POST',  headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)}); return r.json(); }
async function put(url, body)     { const r = await fetch(url, {method:'PUT',   headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)}); return r.json(); }
async function del(url)           { const r = await fetch(url, {method:'DELETE'}); return r.json(); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

async function quitApp() {
  if (!confirm('Quitter l\'application ?')) return;
  await fetch('/api/shutdown', { method: 'POST' }).catch(() => {});
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;background:#f7f5f0;font-family:'Libre Franklin',sans-serif">
      <div style="font-size:32px">⏻</div>
      <div style="font-size:18px;font-weight:600;color:#1c1b18">Application arrêtée</div>
      <div style="font-size:13px;color:#6b6760">Vous pouvez fermer cet onglet.</div>
    </div>`;
}

init();
</script>
</body>
</html>
